<button onclick="buscarUsuario()">Buscar</button>

<input type="text" id="nome" placeholder="Digite seu nome">
<input type="text" id="email" placeholder="Digite seu email">
<input type="text" id="senha" placeholder="Digite sua senha">

<button onclick="cadastrarUsuario()">Cadastrar</button>

<div id="lista-usuarios"></div>

<script>
    async function buscarUsuario() {
        const resultado = await fetch('http://localhost:3000/usuario')
        const usuarios = await resultado.json()
        renderizarUsuarios(usuarios)
    }

    function renderizarUsuarios(usuarios) {
        const div = document.getElementById("lista-usuarios")
        div.innerHTML = "" // limpa antes de renderizar

        usuarios.forEach(usuario => {
            const card = document.createElement('div')
            card.style.border = '1px solid #ccc'
            card.style.margin = '5px'
            card.style.padding = '5px'

            card.innerHTML = `<h3>${usuario.nome}</h3>`
            div.appendChild(card)
        })
    }

    async function cadastrarUsuario() {
        const nome = document.getElementById('nome').value
        const senha = document.getElementById('senha').value
        const email = document.getElementById('email').value

        const body = { nome, email, senha }

        const resultado = await fetch('http://localhost:3000/usuario', {
            method: 'POST',
            body: JSON.stringify(body),
            headers: {
                "Content-Type": "application/json"
            }
        })

        const retorno = await resultado.json()
        console.log(retorno)

        buscarUsuario()
    }
</script>
